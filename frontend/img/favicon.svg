<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- PlutoSpace app/tab ICON: the mound + twinkle on a fixed dark rounded tile, so the favicon is a
     self-contained app icon that never shows an out-of-place light box (and survives the bundler's
     SVG optimizer, which strips <style>/@media). The transparent mark (plutospace.svg) is used in-page. -->
